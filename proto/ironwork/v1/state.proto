syntax = "proto3";

package ironwork.v1;

import "google/protobuf/timestamp.proto";

// StateService has two servers with different halves (like WorkerService):
// schedulers serve GetClusterState with their Raft + worker-registry view;
// statemanager replicas serve GetClusterState plus the CRDT half — an
// eventually-consistent job-statistics view replicated by push-pull gossip
// (SyncState), fed by worker reports (ReportJobEvent), inspectable for the
// convergence dashboard (GetCRDTState), with partition simulation
// (SetGossip).
service StateService {
  rpc GetClusterState(GetClusterStateRequest) returns (GetClusterStateResponse);
  // ReportJobEvent ingests one terminal job outcome into this replica's CRDT.
  rpc ReportJobEvent(ReportJobEventRequest) returns (ReportJobEventResponse);
  // SyncState is one push-pull gossip exchange: the receiver merges the
  // sender's state and replies with its own (merged) state.
  rpc SyncState(SyncStateRequest) returns (SyncStateResponse);
  rpc GetCRDTState(GetCRDTStateRequest) returns (GetCRDTStateResponse);
  // SetGossip toggles gossip participation — disabling it on replicas
  // simulates a network partition while writes continue.
  rpc SetGossip(SetGossipRequest) returns (SetGossipResponse);
}

message ReportJobEventRequest {
  string job_id = 1;
  string worker = 2;
  // Terminal outcome: "succeeded" or "failed".
  string outcome = 3;
}

message ReportJobEventResponse {}

message SyncStateRequest {
  CRDTState state = 1;
}

message SyncStateResponse {
  CRDTState state = 1;
}

message GetCRDTStateRequest {}

message GetCRDTStateResponse {
  CRDTState state = 1;
  bool gossip_enabled = 2;
  // Replica id of the reporting statemanager.
  string replica = 3;
}

message SetGossipRequest {
  bool enabled = 1;
}

message SetGossipResponse {
  bool enabled = 1;
}

// CRDTState is the mergeable payload: grow-only counters sharded by replica
// plus a last-writer-wins map of recent job outcomes.
message CRDTState {
  // status -> G-Counter (e.g. "succeeded" -> {statemanager-1: 4, ...}).
  map<string, GCounterState> by_status = 1;
  // worker -> G-Counter of completed jobs.
  map<string, GCounterState> by_worker = 2;
  // job_id -> latest observed outcome (LWW, bounded window).
  map<string, LWWEntry> recent = 3;
}

message GCounterState {
  // replica id -> that replica's shard; merge = pointwise max, value = sum.
  map<string, uint64> shards = 1;
}

message LWWEntry {
  string status = 1;
  string worker = 2;
  int64 ts_unix_ms = 3;
  // Replica that observed the event; breaks timestamp ties.
  string replica = 4;
}

message GetClusterStateRequest {}

message GetClusterStateResponse {
  ClusterState state = 1;
}

message ClusterState {
  // Node that produced this snapshot.
  string reporting_node = 1;
  repeated NodeInfo nodes = 2;
  JobCounts job_counts = 3;
  google.protobuf.Timestamp as_of = 4;
  // Raft consensus view of the reporting node (schedulers only, Phase 3+).
  RaftStatus raft = 5;
  // Worker liveness/load as tracked by the reporting scheduler's heartbeat
  // registry (Phase 4+).
  repeated WorkerStatus workers = 6;
}

message WorkerStatus {
  string instance = 1;
  // False once heartbeats have gone stale past the dead TTL.
  bool alive = 2;
  double seconds_since_heartbeat = 3;
  uint32 capacity = 4;
  uint32 inflight = 5;
}

message RaftStatus {
  // Raft role of the reporting node: Leader, Follower, or Candidate.
  string state = 1;
  // Instance name of the leader as this node sees it ("" during election).
  string leader_id = 2;
  uint64 term = 3;
  uint64 last_log_index = 4;
  // Index of the last log entry applied to this node's FSM; converging
  // applied_index across nodes shows replication catching up.
  uint64 applied_index = 5;
  repeated string peers = 6;
  // Placement decisions replicated through the Raft log (newest last).
  repeated PlacementRecord recent_placements = 7;
}

message PlacementRecord {
  string job_id = 1;
  string worker = 2;
  google.protobuf.Timestamp at = 3;
}

message NodeInfo {
  string id = 1;
  // Component kind: gateway, scheduler, worker, statemanager, observer.
  string component = 2;
  string address = 3;
}

message JobCounts {
  uint64 pending = 1;
  uint64 scheduled = 2;
  uint64 running = 3;
  uint64 succeeded = 4;
  uint64 failed = 5;
}
