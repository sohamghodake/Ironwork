syntax = "proto3";

package ironwork.v1;

import "google/protobuf/timestamp.proto";

// JobService is the client-facing API for submitting and inspecting jobs.
// A job is a unit of work to be placed on and executed by a worker node.
// Phase 0/1 jobs are trivial stubs (sleep + return).
service JobService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_SCHEDULED = 2;
  JOB_STATUS_RUNNING = 3;
  JOB_STATUS_SUCCEEDED = 4;
  JOB_STATUS_FAILED = 5;
}

message Job {
  string id = 1;
  string name = 2;
  // Opaque job input; interpreted by the worker's job handler.
  bytes payload = 3;
  JobStatus status = 4;
  string assigned_worker_id = 5;
  uint32 attempts = 6;
  string error = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  // Set by the worker when the execution attempt starts / reaches a terminal
  // state; unset until then.
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp finished_at = 11;
}

message SubmitJobRequest {
  string name = 1;
  bytes payload = 2;
}

message SubmitJobResponse {
  Job job = 1;
}

message GetJobRequest {
  string id = 1;
}

message GetJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  JobStatus status_filter = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string next_page_token = 2;
}
