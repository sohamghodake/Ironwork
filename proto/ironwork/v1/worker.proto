syntax = "proto3";

package ironwork.v1;

import "google/protobuf/timestamp.proto";
import "ironwork/v1/job.proto";

// WorkerService is the control-plane contract around workers.
//
// ExecuteJob is served BY the worker: the placer (gateway in Phase 1, the
// scheduler from Phase 2 on) dispatches a job and the worker acks acceptance,
// then executes asynchronously and writes status transitions to Postgres.
// RegisterWorker/Heartbeat/ReportJobResult are the worker-as-client half,
// served by the scheduler from Phase 2/4 on.
service WorkerService {
  rpc ExecuteJob(ExecuteJobRequest) returns (ExecuteJobResponse);
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportJobResult(ReportJobResultRequest) returns (ReportJobResultResponse);
}

message ExecuteJobRequest {
  // Job row already persisted by the placer; the worker owns all subsequent
  // status transitions (scheduled -> running -> succeeded/failed).
  string job_id = 1;
  string name = 2;
  bytes payload = 3;
}

message ExecuteJobResponse {
  // Instance name of the accepting worker.
  string worker_instance = 1;
}

message RegisterWorkerRequest {
  string worker_id = 1;
  string address = 2;
  // Maximum number of jobs this worker can run concurrently.
  uint32 capacity = 3;
}

message RegisterWorkerResponse {
  // Interval the worker must heartbeat at to be considered alive.
  uint32 heartbeat_interval_seconds = 1;
}

message HeartbeatRequest {
  string worker_id = 1;
  uint32 capacity = 2;
  // Jobs currently executing; capacity - inflight is free headroom.
  uint32 inflight = 3;
  google.protobuf.Timestamp sent_at = 4;
}

message HeartbeatResponse {}

message ReportJobResultRequest {
  string worker_id = 1;
  string job_id = 2;
  JobStatus status = 3;
  string error = 4;
}

message ReportJobResultResponse {}
